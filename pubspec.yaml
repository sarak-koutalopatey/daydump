name: daydump
description: "DayDump — a frictionless end-of-day personal journal."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  share_plus: ^10.0.3
  intl: ^0.20.2
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0
  app_settings: ^5.1.1
  sqflite: ^2.4.0
  path: ^1.9.0
  path_provider: ^2.1.5
  file_picker: ^8.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/daydump_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
